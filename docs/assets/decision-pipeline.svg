<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">MCPGuard L1 L2 L3 decision pipeline</title>
  <desc id="desc">A technical flow diagram showing an LSM hook entering L1 cache lookup, falling through to L2 checks on cache miss, falling through to L3 policy matching on L2 miss, then updating cache, metrics, and returning a decision.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#263238"/>
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#687781"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .title { font: 700 23px Arial, Helvetica, sans-serif; fill: #101820; }
      .caption { font: 400 13px Arial, Helvetica, sans-serif; fill: #54636d; }
      .box-title { font: 700 15px Arial, Helvetica, sans-serif; fill: #101820; }
      .box-text { font: 400 12px Arial, Helvetica, sans-serif; fill: #394952; }
      .label { font: 700 11px Arial, Helvetica, sans-serif; fill: #46545d; }
      .note { font: 400 11px Arial, Helvetica, sans-serif; fill: #5c6b74; }
      .box { fill: #fff; stroke: #263238; stroke-width: 1.3; }
      .hook { fill: #f7f9fb; }
      .l1 { fill: #fff8e8; stroke: #6f5934; }
      .l2 { fill: #eef7f1; stroke: #456b55; }
      .l3 { fill: #f6f1f8; stroke: #66506f; }
      .decision { fill: #f4f8fb; stroke: #334954; }
      .output { fill: #fff5f3; stroke: #7b4a43; }
      .map { fill: #f8fafc; stroke: #4d5b66; stroke-dasharray: 5 4; }
      .line { stroke: #263238; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #687781; stroke-width: 1.3; fill: none; marker-end: url(#arrow-muted); }
      .dash { stroke: #687781; stroke-width: 1.3; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrow-muted); }
      .hit { stroke: #3f7a57; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .miss { stroke: #8a5a26; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="560"/>
  <text x="40" y="42" class="title">L1/L2/L3 policy decision pipeline</text>
  <text x="40" y="64" class="caption">Only the L1 program is attached to the LSM hook; misses use BPF tail calls to reach deeper checks.</text>

  <rect x="52" y="112" width="146" height="62" class="box hook"/>
  <text x="125" y="138" text-anchor="middle" class="box-title">LSM hook</text>
  <text x="125" y="158" text-anchor="middle" class="box-text">exec / file / socket</text>

  <rect x="258" y="106" width="190" height="74" class="box l1"/>
  <text x="353" y="132" text-anchor="middle" class="box-title">L1 fast path</text>
  <text x="353" y="153" text-anchor="middle" class="box-text">epoch + decision cache</text>
  <text x="353" y="169" text-anchor="middle" class="box-text">O(1) map lookup</text>

  <rect x="508" y="106" width="190" height="74" class="box l2"/>
  <text x="603" y="132" text-anchor="middle" class="box-title">L2 semi-fast path</text>
  <text x="603" y="153" text-anchor="middle" class="box-text">cheap resource class</text>
  <text x="603" y="169" text-anchor="middle" class="box-text">optional cache fill</text>

  <rect x="758" y="106" width="190" height="74" class="box l3"/>
  <text x="853" y="132" text-anchor="middle" class="box-title">L3 slow path</text>
  <text x="853" y="153" text-anchor="middle" class="box-text">LPM trie / rule match</text>
  <text x="853" y="169" text-anchor="middle" class="box-text">event construction</text>

  <rect x="972" y="112" width="112" height="62" class="box decision"/>
  <text x="1028" y="138" text-anchor="middle" class="box-title">Return</text>
  <text x="1028" y="158" text-anchor="middle" class="box-text">allow / deny</text>

  <path d="M198 143 H248" class="line"/>
  <path d="M448 143 H498" class="miss"/>
  <text x="473" y="131" text-anchor="middle" class="label">miss</text>
  <path d="M698 143 H748" class="miss"/>
  <text x="723" y="131" text-anchor="middle" class="label">miss</text>
  <path d="M948 143 H962" class="line"/>

  <path d="M353 106 V82 H1028 V102" class="hit"/>
  <text x="518" y="77" text-anchor="middle" class="label">cache hit</text>
  <path d="M603 106 V92 H1006 V102" class="hit"/>
  <text x="744" y="89" text-anchor="middle" class="label">cheap decision</text>

  <rect x="260" y="268" width="190" height="70" class="map"/>
  <text x="355" y="294" text-anchor="middle" class="box-title">L1 cache map</text>
  <text x="355" y="316" text-anchor="middle" class="box-text">key: tgid, pid, hook, resource</text>

  <rect x="510" y="268" width="190" height="70" class="map"/>
  <text x="605" y="294" text-anchor="middle" class="box-title">Tail-call state</text>
  <text x="605" y="316" text-anchor="middle" class="box-text">per-CPU timing and context</text>

  <rect x="760" y="268" width="190" height="70" class="map"/>
  <text x="855" y="294" text-anchor="middle" class="box-title">Policy indexes</text>
  <text x="855" y="316" text-anchor="middle" class="box-text">path, command, socket, resource</text>

  <rect x="632" y="404" width="190" height="64" class="box output"/>
  <text x="727" y="430" text-anchor="middle" class="box-title">Metrics</text>
  <text x="727" y="449" text-anchor="middle" class="box-text">count, avg, min, max, buckets</text>

  <rect x="870" y="404" width="190" height="64" class="box output"/>
  <text x="965" y="430" text-anchor="middle" class="box-title">Ring buffer</text>
  <text x="965" y="449" text-anchor="middle" class="box-text">deny / audit events</text>

  <path d="M353 180 V258" class="dash"/>
  <path d="M355 268 V190" class="dash"/>
  <path d="M603 180 V258" class="dash"/>
  <path d="M853 180 V258" class="dash"/>
  <path d="M855 338 V384 H965 V394" class="thin"/>
  <path d="M853 180 C853 232 727 350 727 394" class="thin"/>
  <path d="M853 180 C853 224 355 228 355 258" class="dash"/>

  <text x="40" y="520" class="note">Interpretation: warm follow-up file access should mostly stop at L1; cold or first-time access pays L3 once and may then populate the cache.</text>
</svg>
